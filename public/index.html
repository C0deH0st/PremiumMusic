<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Music</title>
  <link rel="icon" type="image/png" href="./images/logo-small.png?v=20260301-5">
  <link rel="stylesheet" href="./css/style.css?v=20260301-5">
  <script src="./js/vue.global.js?v=3.5.29"></script>
</head>
<body>
  <div class="app" id="app" :class="`bg-${currentBackground}`">
    <button class="header-playlist-toggle" @click="togglePlaylist" :title="isPlaylistVisible ? '隐藏播放列表' : '显示播放列表'" :class="{ 'visible': !isPlaylistVisible }">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"></path>
      </svg>
    </button>

    <div class="starry-sky" ref="starrySkyRef"></div>

    <header class="header">
      <div class="header-left">
        <div class="logo">
          <img src="./images/logo-small.png?v=20260301-5" alt="Premium Music Logo" class="logo-image">
          <span class="logo-text">Premium Music</span>
        </div>
        <div class="header-current" v-bind:class="{ 'has-content': currentSong }">
          <span class="header-current-title" v-text="currentSong?.title || ''"></span>
          <span class="header-current-artist" v-text="currentSong?.artist || ''"></span>
        </div>
      </div>
      <div class="search-box" :class="{ 'mobile-visible': isMobileSearchVisible }">
        <input ref="searchInputRef" type="text" v-model="searchQuery" placeholder="搜索歌曲、歌手、专辑...">
        <button>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="m21 21-3.5-3.5"></path>
          </svg>
        </button>
      </div>
      <button class="mobile-search-btn" @click="toggleMobileSearch">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="m21 21-3.5-3.5"></path>
        </svg>
      </button>
      <button
        class="background-switch-btn"
        @click="cycleBackground"
        :title="`切换背景（当前：${currentBackgroundLabel}）`"
        :aria-label="`切换背景（当前：${currentBackgroundLabel}）`"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="13.5" cy="6.5" r="2.5"></circle>
          <circle cx="7.5" cy="12" r="2.5"></circle>
          <circle cx="16.5" cy="16.5" r="2.5"></circle>
          <path d="M10 8.5l-1 1.3M9.8 13.8l3.4 1.2"></path>
        </svg>
      </button>
    </header>

    <main class="main-content">
      <playlist-sidebar
        :is-playlist-visible="isPlaylistVisible"
        :song-count="songCount"
        :filtered-groups="filteredGroups"
        :filtered-songs="filteredSongs"
        :current-song="currentSong"
        :is-group-collapsed="isGroupCollapsed"
        :format-time="formatTime"
        @toggle-playlist="togglePlaylist"
        @toggle-group="toggleGroup"
        @play-song="handlePlaySongFromList"
        @cover-error="handleCoverError"
      ></playlist-sidebar>

      <lyrics-panel
        :is-playing="isPlaying"
        :current-song="currentSong"
        :lyrics="lyrics"
        :display-lyrics="displayLyrics"
        :tonearm-animation="tonearmAnimation"
        :is-pc="isPC"
        @toggle-pc-fullscreen="togglePCFullscreen"
        @cover-error="handleCoverError"
      ></lyrics-panel>
    </main>

    <footer class="player-bar" @click="handleMobilePlayerBarClick">
      <div class="player-left">
        <div class="mini-cover">
          <img v-if="currentSong?.cover" :key="'mini-' + (currentSong?.id || 'none')" :src="currentSong.cover" :alt="currentSong.title" @error="handleCoverError">
          <div v-else class="mini-cover-placeholder">♪</div>
        </div>
        <div class="mini-info">
          <div class="mini-title" v-text="currentSong?.title || '未选择歌曲'"></div>
          <div class="mini-artist" v-text="currentSong?.artist || '--'"></div>
        </div>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button class="control-btn" title="上一首" @click="playPrev">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"></path>
            </svg>
          </button>
          <button class="control-btn play-btn" title="播放/暂停" @click="togglePlay">
            <svg v-if="!isPlaying" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"></path>
            </svg>
            <svg v-else width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 4h4v16H6zM14 4h4v16h-4z"></path>
            </svg>
          </button>
          <button class="control-btn" title="下一首" @click="playNext">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 4l10 8-10 8V4zM19 5v14h2V5h-2z"></path>
            </svg>
          </button>
        </div>
        <div class="progress-container">
          <span class="time-current">{{ formatTime(currentTime) }}</span>
          <div class="progress-bar" ref="progressBarRef" @click="handleSeek" @mousedown.prevent="onProgressDragStart">
            <div class="progress" :style="{ width: progressPercent + '%' }"></div>
            <div class="progress-handle" :style="{ left: progressPercent + '%' }" @mousedown.prevent="onProgressDragStart"></div>
          </div>
          <span class="time-total">{{ formatTime(duration) }}</span>
        </div>
      </div>

      <div class="player-right">
        <button class="control-btn lyrics-fullscreen-btn" title="全屏歌词" @click="togglePCFullscreen">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
          </svg>
        </button>
        <button class="control-btn mode-btn" title="播放模式" @click="cyclePlayMode">
          <svg class="mode-icon" width="18" height="18" viewBox="0 0 1024 1024" fill="currentColor" v-html="modeIcon"></svg>
        </button>
        <div class="volume-control">
          <button class="control-btn volume-icon" title="音量" @click="toggleMute">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon v-if="!isMuted" points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path v-if="!isMuted" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <polygon v-else points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path v-if="isMuted" d="M23 9l-6 6M17 9l6 6"></path>
            </svg>
          </button>
          <div class="volume-bar" @click="handleVolumeClick">
            <div class="volume-level" :style="{ width: (isMuted ? 0 : volume * 100) + '%' }"></div>
          </div>
        </div>
      </div>
    </footer>

    <div class="fullscreen-lyrics" :class="{ active: isFullscreen }" ref="fullscreenLyricsRef" @click="handleFullscreenBgClick">
      <div class="fullscreen-header">
        <button class="fullscreen-exit" @click="closeFullscreen">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
        <div class="fullscreen-header-info">
          <div class="fullscreen-header-title" ref="fullscreenTitleRef">
            <span class="fullscreen-header-title-text" ref="fullscreenTitleTextRef" :class="{ 'marquee': isMobileTitleOverflow }">{{ currentSong?.title || '未选择歌曲' }}</span>
          </div>
          <div class="fullscreen-header-artist" v-text="currentSong?.artist || '--'"></div>
        </div>
        <div class="fullscreen-header-spacer"></div>
      </div>
      <div class="fullscreen-vinyl">
        <div class="vinyl-container">
          <div class="tonearm" :class="{ playing: isPlaying, entering: tonearmAnimation === 'entering', exiting: tonearmAnimation === 'exiting' }">
            <div class="tonearm-base"></div>
            <div class="tonearm-counterweight"></div>
            <div class="tonearm-pivot"></div>
            <div class="tonearm-arm">
              <div class="tonearm-head">
                <div class="tonearm-stylus"></div>
              </div>
            </div>
          </div>
          <div class="vinyl-disc large" v-bind:class="{ 'playing': isPlaying }">
            <div class="vinyl-cover">
              <img v-if="currentSong?.cover" :key="'fs-' + (currentSong?.id || 'none')" :src="currentSong.cover" :alt="currentSong?.title" @error="handleCoverError">
              <div v-else class="vinyl-placeholder">♪</div>
            </div>
            <div class="vinyl-label" v-if="currentSong">
              <div class="vinyl-label-title">{{ currentSong.title }}</div>
              <div class="vinyl-label-artist">{{ currentSong.artist }}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="fullscreen-lyrics-content" ref="fullscreenLyricsContentRef" :class="{ 'mobile-fixed': isMobileViewport }">
        <template v-if="lyrics.length > 0">
          <div
            v-for="(line, index) in fullscreenDisplayLyrics"
            :key="line.key || index"
            class="lyrics-line"
            :class="{ 'active': line.isCurrent }"
          >{{ line.text || ' ' }}</div>
        </template>
        <div v-else class="lyrics-empty">暂无歌词</div>
      </div>
    </div>

    <!-- PC全屏歌词界面 -->
    <div 
      class="lyrics-panel-pc-fullscreen" 
      :class="{ active: isPCFullscreen, 'show-close': pcFullscreenShowClose }"
      @mousemove="handlePCFullscreenMouseMove"
    >
      <button class="pc-fullscreen-close" @click="closePCFullscreen" title="关闭全屏 (ESC)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
      <div class="pc-fullscreen-vinyl">
        <div class="vinyl-container">
          <div class="tonearm" :class="{ playing: isPlaying, entering: tonearmAnimation === 'entering', exiting: tonearmAnimation === 'exiting' }">
            <div class="tonearm-base"></div>
            <div class="tonearm-counterweight"></div>
            <div class="tonearm-pivot"></div>
            <div class="tonearm-arm">
              <div class="tonearm-head">
                <div class="tonearm-stylus"></div>
              </div>
            </div>
          </div>
          <div class="vinyl-disc large" :class="{ playing: isPlaying }">
            <div class="vinyl-cover">
              <img v-if="currentSong?.cover" :key="'pcfs-' + (currentSong?.id || 'none')" :src="currentSong.cover" :alt="currentSong?.title" @error="handleCoverError">
              <div v-else class="vinyl-placeholder">♪</div>
            </div>
            <div class="vinyl-label" v-if="currentSong">
              <div class="vinyl-label-title">{{ currentSong.title }}</div>
              <div class="vinyl-label-artist">{{ currentSong.artist }}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="pc-fullscreen-lyrics-content mobile-fixed" ref="pcFullscreenLyricsContentRef">
        <template v-if="lyrics.length > 0">
          <div
            v-for="(line, index) in fullscreenDisplayLyrics"
            :key="line.key || index"
            class="lyrics-line"
            :class="{ 'active': line.isCurrent }"
          >{{ line.text || ' ' }}</div>
        </template>
        <div v-else class="lyrics-empty">暂无歌词</div>
      </div>
    </div>
  </div>

  <script src="./js/app.js?v=20260301-5"></script>
</body>
</html>
